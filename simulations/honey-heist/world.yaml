concept:
  premise: >
    Este es un mundo de humanos. Los personajes son osos que se hacen pasar por
    humanos para robar la Golden Comb en HoneyCon. Ningún humano sabe que son osos.
    Si alguien lo descubre, el operativo termina.
  flavor: comedia de robo absurdista con tensión real
  rules:
    - Caminar siempre en dos patas, nunca en cuatro
    - No oler visiblemente la miel — los humanos no reaccionan así ante el aroma
    - Usar las manos como humanos, no las garras
    - No gruñir, rugir ni emitir sonidos no humanos bajo ninguna circunstancia
    - Si alguien pregunta por tu cobertura, responde sin titubear — los humanos no sudan ante preguntas normales
    - El contacto físico accidental que revele pelaje debe explicarse como "ropa inusual"

weather: clear indoors — the convention centre is climate-controlled
atmosphere: electric anticipation

initial_location: Convention Lobby

locations:
  - name: Convention Lobby
    description: >
      The grand entrance of HoneyCon. Four thousand bears mill about under
      amber chandeliers. Security desk left of the main doors; two guards
      check badges.
    details: >
      The two badge-checkers rotate every twenty minutes. The taller one,
      Gustav, is distracted — keeps checking his phone. The fire door to the
      right of the security desk is propped open with a wedge — someone's been
      going in and out without badging. The crowd noise makes radio comms
      unreliable from this position.

  - name: Vendor Hall
    description: >
      A cavernous hall packed with honey stalls and tasting booths. Noise
      and scent create near-perfect cover for movement.
    details: >
      Three service corridors connect to the back of house — only the
      middle one leads directly to the Vault Antechamber key-card reader.
      The left corridor dead-ends at a storage room full of empty exhibition
      crates. A honey sommelier is mid-argument with a vendor about barrel
      aging; the crowd around them creates a useful visual obstruction from
      camera position C-7.

  - name: Security Office
    description: >
      A cramped room behind the main desk with monitors showing every corridor.
      Two guards rotate on thirty-minute shifts.
    details: >
      The alarm relay panel is on the far wall, physically accessible from
      inside the room only. Feed C-9 covers the Vault Antechamber. The
      guard shift log is reviewed at the start of each rotation.

  - name: Vault Antechamber
    description: >
      A locked corridor accessible via key-card reader outside the Security
      Office. No cameras. Heavy steel door leads to the vault.
    details: >
      The key-card reader has a 4-second delay between swipes — rushing it
      triggers a lockout. The concrete walls are thick enough that radio
      comms cut out completely inside. The vault door hums on a continuous
      frequency — if that hum changes pitch, the pressure sensor inside has
      been triggered.

  - name: Vault
    description: >
      Climate-controlled at precisely 14°C. The Golden Comb — a crystallized
      honeycomb the size of a cub — sits on a pressure-sensitive plinth.
    details: >
      One motion sensor, top-right corner, 120-degree arc. The dead zone is
      a 30cm strip along the left wall — move along it and the sensor won't
      trigger. The plinth registers any weight differential greater than 50g.
      Four minutes of exposure to ambient temperature differential triggers
      a passive alarm.

  - name: Alley (Exit)
    description: >
      The narrow service alley behind the convention centre. The ring road
      is forty seconds north.
    details: >
      Two exit routes available: north to the ring road (forty seconds, clear),
      east through the depot district (ninety seconds, two lights). A patrol
      car does a loop past the alley mouth every eighteen minutes.

initial_events:
  - description: >
      HoneyCon opening day. Thousands of attendees are streaming through the
      main entrance — lanyards, tote bags, and the smell of honey everywhere.
      The convention floor is just opening; the new guard shift is getting
      settled at the security desk.
    event_type: scene_setup
    visibility: public

  - description: >
      The Golden Comb has been confirmed on display. Convention organisers
      announced it as the centrepiece exhibit — a crystallized honeycomb
      the size of a cub, on loan from a private collector, secured in the
      Vault for the duration of the event.
    event_type: scene_setup
    visibility: public

  - description: >
      Security rotation begins. Two guards take their positions at the
      Convention Lobby desk; a third is assigned to rounds through the
      Vendor Hall every forty minutes.
    event_type: scene_setup
    visibility: public
